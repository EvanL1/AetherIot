version: 1
suite: aether.data-processing.v1
execution: cargo_test_evidence
description: >-
  Machine-readable AI-facing scenarios for the landed Data Processing
  capability. This fixture has no independent eval runner; every scenario is
  proven by the named deterministic Rust test.
scenarios:
  - id: process-denied-without-permission
    capability: data_processing.process
    given: authenticated actor lacks data_processing.run
    expect:
      outcome: denied
      before:
        - history_read
        - covariate_read
        - processor_call
    evidence:
      command: cargo test -p aether-application --test data_processing_application permission_denial_happens_before_any_data_read_or_processor_call
      test: permission_denial_happens_before_any_data_read_or_processor_call

  - id: remote-route-requires-confirmation
    capability: data_processing.process
    given: commissioned processor boundary is remote and actor has not confirmed
    expect:
      outcome: confirmation_required
      before:
        - data_egress
    evidence:
      command: cargo test -p aether-application --test data_processing_application remote_route_requires_policy_confirmation_before_data_egress
      test: remote_route_requires_policy_confirmation_before_data_egress

  - id: mandatory-audit-fails-before-egress
    capability: data_processing.process
    given: required durable audit sink is unavailable
    expect:
      outcome: audit_unavailable
      before:
        - processor_call
        - data_egress
    evidence:
      command: cargo test -p aether-application --test data_processing_application mandatory_attempt_audit_fails_closed_before_processor_egress
      test: mandatory_attempt_audit_fails_closed_before_processor_egress

  - id: repeated-content-still-executes
    capability: data_processing.process
    given: two invocations have the same governed content identity
    expect:
      idempotent: false
      processor_calls: 2
      no_guarantee:
        - request_deduplication
        - exact_replay
        - cached_result
        - request_id_reuse_409
    evidence:
      command: cargo test -p aether-application --test data_processing_application repeated_correlation_inputs_derive_stable_ids_but_still_execute_each_request
      test: repeated_correlation_inputs_derive_stable_ids_but_still_execute_each_request

  - id: malformed-or-uncorrelated-result-is-untrusted
    capability: data_processing.process
    given: processor response is malformed or changes request correlation
    expect:
      outcome: invalid_processor_result
      derived_data_created: false
    evidence:
      command: cargo test -p aether-application --test data_processing_application mismatched_processor_correlation_is_rejected_as_untrusted_output
      test: mismatched_processor_correlation_is_rejected_as_untrusted_output
      additional_command: cargo test -p aether-http-data-processor --test http_data_processor malformed_wrong_media_type_and_invalid_results_are_rejected
      additional_test: malformed_wrong_media_type_and_invalid_results_are_rejected

  - id: processor-unavailable-is-isolated
    capability: data_processing.process
    given: processor or source port is unavailable
    expect:
      outcome: typed_failure
      unaffected:
        - acquisition
        - history_service
        - alarms
        - deterministic_automation
    evidence:
      command: cargo test -p aether-application --test data_processing_application history_covariate_and_processor_failures_remain_typed_and_isolated
      test: history_covariate_and_processor_failures_remain_typed_and_isolated
      additional_command: cargo test -p aether-example-energy-gateway --test composition_contract bundled_energy_composition_starts_uncommissioned_and_fail_safe
      additional_test: bundled_energy_composition_starts_uncommissioned_and_fail_safe

  - id: derived-data-has-no-device-authority
    capability: data_processing.process
    given: a processing binding or result attempts to cross the live-state/control boundary
    expect:
      live_state_write: forbidden
      device_command: forbidden
      derived_data_is_measurement: false
    evidence:
      command: cargo test -p aether-application --test data_processing_application commissioned_binding_rejects_writable_points_and_unmapped_targets
      test: commissioned_binding_rejects_writable_points_and_unmapped_targets
      additional_command: cargo test -p aether-domain --test data_processing_contract derived_data_accepts_only_usable_unexpired_results
      additional_test: derived_data_accepts_only_usable_unexpired_results
