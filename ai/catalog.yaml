version: 1
project: aether
components:
  domain:
    path: crates/aether-domain
    responsibility: Industry-neutral entities, values, commands, and events
    verify:
      - cargo test -p aether-domain
  ports:
    path: crates/aether-ports
    responsibility: Object-safe extension contracts with recovery semantics
    verify:
      - cargo test -p aether-ports
  dataplane:
    path: crates/aether-dataplane
    responsibility: Database-free physical SHM layout, mmap I/O, slots, and snapshots
    verify:
      - cargo test -p aether-dataplane
  application:
    path: crates/aether-application
    responsibility: Commands, queries, authorization, safety, and audit flow
    verify:
      - cargo test -p aether-application
  action_routing_application:
    path: crates/aether-application/src/action_routing.rs
    responsibility: Governed physical C/A route mutations shared by HTTP, CLI, and MCP
    verify:
      - cargo test -p aether-application --test action_routing_application
      - cargo test -p aether-automation --test test_action_routing_boundary
  channel_management_application:
    path: crates/aether-application/src/channel_management.rs
    responsibility: Confirmed, audited, transport-neutral channel desired-state mutations shared by HTTP, CLI, and MCP
    verify:
      - cargo test -p aether-application --test channel_management_application
      - cargo test -p aether-io --test channel_mutator_contract
  pack_contract:
    path: crates/aether-pack
    responsibility: Versioned fail-closed manifest, compatibility, identifier, commissioning, and pack-root asset validation
    verify:
      - cargo test -p aether-pack
  runtime_catalog:
    path: libs/aether-runtime-catalog
    responsibility: Versioned feature-exact runtime metadata, target/adapter derivation, canonical checksums, and shared fail-closed Pack compatibility loading
    verify:
      - cargo test -p aether-runtime-catalog
      - ./scripts/test-runtime-manifest.sh
  runtime_manifest_schema:
    path: contracts/runtime/runtime-manifest.v1.schema.json
    responsibility: Machine-readable closed contract for one concrete Aether runtime composition
    verify:
      - uvx --from check-jsonschema check-jsonschema --check-metaschema contracts/runtime/runtime-manifest.v1.schema.json
  pack_schema:
    path: contracts/pack/pack-manifest.v1.schema.json
    responsibility: Machine-readable Pack v1 manifest contract
    verify:
      - uvx --from check-jsonschema check-jsonschema --check-metaschema contracts/pack/pack-manifest.v1.schema.json
  data_processing:
    path: crates/aether-application/src/data_processing.rs
    responsibility: Governed frame assembly, processor invocation, untrusted-result validation, and DerivedData stamping
    verify:
      - cargo test -p aether-application --test data_processing_application
      - cargo test -p aether-application --test safety_policy_contract
  data_processing_codec:
    path: crates/aether-data-processing
    responsibility: Strict transport-neutral v1 JSON conversion and RFC 8785 input digests
    verify:
      - cargo test -p aether-data-processing
  data_processing_contracts:
    path: contracts/data-processing
    responsibility: Strict Draft 2020-12 wire schemas for every v1 Data Processing trust boundary
    verify:
      - uvx --from check-jsonschema check-jsonschema --check-metaschema contracts/data-processing/*.schema.json
  data_processing_ai_evals:
    path: ai/evals/data-processing.yaml
    responsibility: AI-facing permission, confirmation, audit, non-idempotency, failure-isolation, and no-control scenarios backed by Rust tests
    verify:
      - ruby -ryaml -e 'YAML.safe_load(File.read(ARGV.fetch(0)), [], [], false)' ai/evals/data-processing.yaml
      - cargo test -p aether-application --test data_processing_application
      - cargo test -p aether-http-data-processor --test http_data_processor
      - cargo test -p aether-example-energy-gateway --test composition_contract
  data_processing_testkit:
    path: crates/aether-testkit
    responsibility: Reusable HistoryQuery and DataProcessor conformance checks and deterministic test doubles
    verify:
      - cargo test -p aether-testkit
  local_store:
    path: extensions/store-local
    responsibility: Zero-external-service state, history, audit, and crash-recoverable outbox adapters
    verify:
      - cargo test -p aether-store-local
  jwt_auth_adapter:
    path: extensions/auth-jwt
    responsibility: Shared fail-closed access-JWT verification and server-owned application permissions for HTTP and CLI command boundaries
    verify:
      - cargo test -p aether-auth-jwt
  snapshot_covariates:
    path: extensions/store-local/src/snapshot_covariates.rs
    responsibility: Bounded, reloadable local covariate snapshots with valid-time and issue-time provenance
    verify:
      - cargo test -p aether-store-local --test snapshot_covariate_source
  sqlite_history_query:
    path: extensions/sqlite-history-query
    responsibility: Default read-only SQLite HistoryQuery adapter with task-scoped interval aggregation in one snapshot
    verify:
      - cargo test -p aether-sqlite-history-query
  http_history_query:
    path: extensions/http-history-query
    responsibility: Optional loopback HistoryQuery adapter for an upstream pre-aligned Last/Reject cadence grid
    verify:
      - cargo test -p aether-http-history-query
  shm_bridge:
    path: extensions/shm-bridge
    responsibility: Typed channel manifest plus LiveState, acquisition-writer, and C/A command-sink adapters over the physical SHM data plane
    verify:
      - cargo test -p aether-shm-bridge
  redis_bridge:
    path: extensions/redis-bridge
    responsibility: Optional external state mirror; never a source of truth
    verify:
      - cargo test -p aether-redis-bridge
  postgres_history:
    path: extensions/postgres-history
    responsibility: Optional historical and audit persistence
    verify:
      - cargo test -p aether-postgres-history
  http_data_processor:
    path: extensions/http-data-processor
    responsibility: Bounded local or remote HTTP implementation of the DataProcessor port
    verify:
      - cargo test -p aether-http-data-processor
  data_processing_api:
    path: services/api/src/routes_data_processing.rs
    responsibility: Opt-in authenticated Data Processing v1 HTTP task discovery, health, and process routes
    verify:
      - cargo test -p aether-api --bin aether-api routes_data_processing
  data_processing_runtime:
    path: services/api/src/data_processing_runtime.rs
    responsibility: Opt-in production composition of SQLite history, snapshot covariates, read-only live state, audit, and HTTP processor routes
    verify:
      - cargo test -p aether-api --bin aether-api data_processing_runtime
  load_forecasting_processor:
    path: integrations/load-forecasting
    responsibility: Opt-in request-driven adapter around the legacy Load-Forecasting model runtime with no reverse Aether data reads
    verify:
      - cd integrations/load-forecasting && uv run pytest
  energy_data_processing:
    path: packs/energy/data-processing
    responsibility: Disabled load/PV task declarations, uncommissioned binding, and cross-language v1 fixtures
    verify:
      - cargo test -p aether-example-energy-gateway --test data_processing_composition
  aether_uplink_runtime:
    path: services/uplink/src/uplink.rs
    responsibility: aether-uplink integration with DurableOutbox and UplinkPublisher
    verify:
      - cargo check -p aether-uplink
  aether_io_protocol_runtime:
    path: services/io/src/protocols
    responsibility: aether-io device protocol runtime
    verify:
      - cargo test -p aether-io --lib
  governed_channel_adapter:
    path: services/io/src/channel_mutator.rs
    responsibility: Local SQLite channel desired-state authority with revision CAS and rebuildable ChannelManager runtime projection
    verify:
      - cargo test -p aether-io --test channel_mutator_contract
  openapi_contracts:
    path: scripts/check-openapi-contracts.sh
    responsibility: Generated Swagger/OpenAPI route, security, schema, and failure-response contracts for all six services
    verify:
      - ./scripts/check-openapi-contracts.sh
  minimal_gateway_example:
    path: examples/minimal-gateway
    responsibility: Runnable SDK composition with no external services
    verify:
      - cargo test -p aether-example-minimal-gateway
