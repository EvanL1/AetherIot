version: 1
defaults:
  decision: deny
  audit: required
  timeout_ms: 5000
risk_levels:
  low:
    confirmation: never
  medium:
    confirmation: policy
  high:
    confirmation: always
capabilities:
  device.read_point:
    kind: query
    risk: low
    permission: device.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.tasks.list:
    kind: query
    risk: low
    permission: data_processing.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.processors.health:
    kind: query
    risk: low
    permission: data_processing.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.process:
    kind: query
    risk: medium
    permission: data_processing.run
    idempotent: false
    confirmation: policy
    audit: required
  device.write_point:
    kind: command
    risk: high
    permission: device.control
    idempotent: false
    confirmation: always
    audit: required
