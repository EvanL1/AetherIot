version: 1
defaults:
  decision: deny
  audit: required
  timeout_ms: 5000
risk_levels:
  low:
    confirmation: never
  medium:
    confirmation: policy
  high:
    confirmation: always
capabilities:
  device.read_point:
    kind: query
    risk: low
    permission: device.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.tasks.list:
    kind: query
    risk: low
    permission: data_processing.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.processors.health:
    kind: query
    risk: low
    permission: data_processing.read
    idempotent: true
    confirmation: never
    audit: not_required
  data_processing.process:
    kind: query
    risk: medium
    permission: data_processing.run
    idempotent: false
    confirmation: policy
    audit: required
  device.write_point:
    kind: command
    risk: high
    permission: device.control
    idempotent: false
    confirmation: always
    audit: required
  automation.rule.execute:
    kind: command
    risk: high
    permission: automation.rule.execute
    idempotent: false
    confirmation: always
    audit: required
  automation.rule.manage:
    kind: command
    risk: high
    permission: automation.rule.manage
    idempotent: false
    confirmation: always
    audit: required
  automation.routing.manage:
    kind: command
    risk: high
    permission: automation.routing.manage
    idempotent: false
    confirmation: always
    audit: required
  automation.instance.manage:
    kind: command
    risk: high
    permission: automation.instance.manage
    idempotent: false
    confirmation: always
    audit: required
  io.channel.manage:
    kind: command
    risk: high
    permission: io.channel.manage
    idempotent: false
    confirmation: always
    audit: required
  io.channel.reconcile:
    kind: command
    risk: high
    permission: io.channel.manage
    idempotent: false
    confirmation: always
    audit: required
  alarm.rule.manage:
    kind: command
    risk: high
    permission: alarm.rule.manage
    idempotent: false
    confirmation: always
    audit: required
  alarm.alert.resolve:
    kind: command
    risk: high
    permission: alarm.alert.resolve
    idempotent: false
    confirmation: always
    audit: required
