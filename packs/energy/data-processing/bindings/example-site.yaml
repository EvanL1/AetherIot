schema: aether.data-processing-binding.v1
id: energy.example-site
revision: 1
enabled: false
commissioned: false
site_ref: example-site
description: Synthetic, non-routable binding for data-processing conformance examples.

instances:
  site_load:
    instance_id: example_site_load
    required: true
    points:
      active_power:
        point_id: active_power
        unit: kW
        sign_convention: positive_consumption
  site_pv:
    instance_id: example_site_pv
    required: true
    points:
      active_power:
        point_id: active_power
        unit: kW
        sign_convention: positive_generation

covariate_sources:
  weather.observed:
    source_ref: example_observed_weather
    required: true
    data_boundary: local
  weather.nwp:
    source_ref: example_forecast_weather
    required: true
    data_boundary: local
    require_issue_time: true
    reject_issue_time_after_as_of: true

task_bindings:
  - task_id: energy.site-load-forecast
    revision: 1
    enabled: false
  - task_id: energy.site-pv-forecast
    revision: 1
    enabled: false

egress:
  remote_allowed: false
  allowed_remote_fields: []

safety:
  write_live_state: forbidden
  write_history: forbidden
  device_control: forbidden
