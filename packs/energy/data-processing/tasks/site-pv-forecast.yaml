schema: aether.data-processing-task.v1
id: energy.site-pv-forecast
revision: 1
enabled: false
kind: forecast
processor_contract: aether.data-processing.forecast.v1
description: Forecast site PV generation from governed PV history and a complete weather frame.

target:
  name: pv
  semantic_point: site.pv.active_power
  value_type: number
  unit: kW
  sign_convention: positive_generation

frame:
  cadence_seconds: 1800
  history_steps: 128
  horizon_steps: 144
  timezone: UTC
  live_tail: forbidden

inputs:
  history:
    - name: pv
      value_type: number
      unit: kW
      required: true
      source:
        kind: measurement
        instance_ref: site_pv
        point_ref: active_power
    - name: DHI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: diffuse_horizontal_irradiance
    - name: DNI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: direct_normal_irradiance
    - name: GHI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: global_horizontal_irradiance
    - name: Clearsky DHI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: clearsky_diffuse_horizontal_irradiance
    - name: Clearsky DNI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: clearsky_direct_normal_irradiance
    - name: Clearsky GHI
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: clearsky_global_horizontal_irradiance
    - name: Cloud Type
      value_type: number
      unit: "1"
      required: true
      range:
        minimum: 0
        maximum: 12
        integer: true
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: cloud_type_code
    - name: Dew Point
      value_type: number
      unit: Cel
      required: true
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: dew_point_temperature
    - name: Solar Zenith Angle
      value_type: number
      unit: deg
      required: true
      range:
        minimum: 0
        maximum: 180
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: solar_zenith_angle
    - name: Fill Flag
      value_type: number
      unit: "1"
      required: true
      range:
        minimum: 0
        integer: true
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: fill_flag
    - name: Surface Albedo
      value_type: number
      unit: "1"
      required: true
      range:
        minimum: 0
        maximum: 1
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: surface_albedo
    - name: Wind Speed
      value_type: number
      unit: m/s
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: wind_speed
    - name: Precipitable
      value_type: number
      unit: cm
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: precipitable_water
    - name: Wind Direction
      value_type: number
      unit: deg
      required: true
      range:
        minimum: 0
        maximum_exclusive: 360
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: wind_direction
    - name: Relative Humidity
      value_type: number
      unit: "%"
      required: true
      range:
        minimum: 0
        maximum: 100
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: relative_humidity
    - name: Temperature
      value_type: number
      unit: Cel
      required: true
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: air_temperature
    - name: Pressure
      value_type: number
      unit: hPa
      required: true
      range:
        minimum_exclusive: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: surface_air_pressure
    - name: Global Horizontal UV Irradiance 280-440
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: global_horizontal_uv_irradiance_280_440
    - name: Global Horizontal UV Irradiance 295-385
      value_type: number
      unit: W/m2
      required: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: global_horizontal_uv_irradiance_295_385

  future_covariates:
    - name: DHI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: diffuse_horizontal_irradiance
    - name: DNI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: direct_normal_irradiance
    - name: GHI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: global_horizontal_irradiance
    - name: Clearsky DHI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: clearsky_diffuse_horizontal_irradiance
    - name: Clearsky DNI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: clearsky_direct_normal_irradiance
    - name: Clearsky GHI
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: clearsky_global_horizontal_irradiance
    - name: Cloud Type
      value_type: number
      unit: "1"
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 12
        integer: true
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: cloud_type_code
    - name: Dew Point
      value_type: number
      unit: Cel
      required: true
      known_ahead: true
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: dew_point_temperature
    - name: Solar Zenith Angle
      value_type: number
      unit: deg
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 180
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: solar_zenith_angle
    - name: Fill Flag
      value_type: number
      unit: "1"
      required: true
      known_ahead: true
      range:
        minimum: 0
        integer: true
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: fill_flag
    - name: Surface Albedo
      value_type: number
      unit: "1"
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 1
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: surface_albedo
    - name: Wind Speed
      value_type: number
      unit: m/s
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: wind_speed
    - name: Precipitable
      value_type: number
      unit: cm
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: precipitable_water
    - name: Wind Direction
      value_type: number
      unit: deg
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum_exclusive: 360
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: wind_direction
    - name: Relative Humidity
      value_type: number
      unit: "%"
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 100
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: relative_humidity
    - name: Temperature
      value_type: number
      unit: Cel
      required: true
      known_ahead: true
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: air_temperature
    - name: Pressure
      value_type: number
      unit: hPa
      required: true
      known_ahead: true
      range:
        minimum_exclusive: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: surface_air_pressure
    - name: Global Horizontal UV Irradiance 280-440
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: global_horizontal_uv_irradiance_280_440
    - name: Global Horizontal UV Irradiance 295-385
      value_type: number
      unit: W/m2
      required: true
      known_ahead: true
      range:
        minimum: 0
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: global_horizontal_uv_irradiance_295_385

  static_features: []

alignment:
  aggregation: mean
  timestamp_semantics: interval_end
  duplicate_policy: latest
  # Categorical flags and circular wind direction use Last/Reject rather than
  # an invalid numeric mean. Site golden fixtures must still prove semantics.
  feature_policies:
    - { name: pv, aggregation: mean, duplicate_policy: latest }
    - { name: DHI, aggregation: mean, duplicate_policy: latest }
    - { name: DNI, aggregation: mean, duplicate_policy: latest }
    - { name: GHI, aggregation: mean, duplicate_policy: latest }
    - { name: Clearsky DHI, aggregation: mean, duplicate_policy: latest }
    - { name: Clearsky DNI, aggregation: mean, duplicate_policy: latest }
    - { name: Clearsky GHI, aggregation: mean, duplicate_policy: latest }
    - { name: Cloud Type, aggregation: last, duplicate_policy: reject }
    - { name: Dew Point, aggregation: mean, duplicate_policy: latest }
    - { name: Solar Zenith Angle, aggregation: mean, duplicate_policy: latest }
    - { name: Fill Flag, aggregation: last, duplicate_policy: reject }
    - { name: Surface Albedo, aggregation: mean, duplicate_policy: latest }
    - { name: Wind Speed, aggregation: mean, duplicate_policy: latest }
    - { name: Precipitable, aggregation: mean, duplicate_policy: latest }
    - { name: Wind Direction, aggregation: last, duplicate_policy: reject }
    - { name: Relative Humidity, aggregation: mean, duplicate_policy: latest }
    - { name: Temperature, aggregation: mean, duplicate_policy: latest }
    - { name: Pressure, aggregation: mean, duplicate_policy: latest }
    - { name: Global Horizontal UV Irradiance 280-440, aggregation: mean, duplicate_policy: latest }
    - { name: Global Horizontal UV Irradiance 295-385, aggregation: mean, duplicate_policy: latest }
  gap_policy: reject
  missing_policy: reject

quality:
  max_input_age_seconds: 1800
  max_gap_seconds: 3600
  max_missing_ratio: 0.0
  require_input_watermark: true
  require_covariate_issue_time_not_after_as_of: true

artifact_policy:
  required: false
  allowed_kinds:
    - model

fallback:
  allowed: true
  strategies:
    - name: persistence
      version: "1"
      source_feature: pv
      max_expires_after_seconds: 1800
  synthetic_zero_baseline: forbidden

execution:
  deadline_ms: 10000
  max_attempts: 1
  # Content identity for correlation/audit only. The public process operation is
  # non-idempotent and does not promise request replay or de-duplication.
  correlation_key: input_digest
  max_request_bytes: 8388608

governance:
  data_classification: operational_telemetry
  remote_egress: denied
  device_effect: none
  audit_raw_values: false

output:
  schema: aether.data-processing.output.forecast.v1
  value_type: number
  unit: kW
  sign_convention: positive_generation
  cadence_seconds: 1800
  timestamp_semantics: interval_end
  max_points: 144
  max_quantiles: 0
  expires_after_seconds: 3600
  publication:
    - query_response
  retention: none
