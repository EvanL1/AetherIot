schema: aether.data-processing-task.v1
id: energy.site-load-forecast
revision: 1
enabled: false
kind: forecast
processor_contract: aether.data-processing.forecast.v1
description: Forecast site import load from governed load, weather, and calendar data.

target:
  name: load
  semantic_point: site.load.active_power
  value_type: number
  unit: kW
  sign_convention: positive_consumption

frame:
  cadence_seconds: 900
  history_steps: 672
  horizon_steps: 288
  timezone: UTC
  live_tail: forbidden

inputs:
  history:
    - name: load
      value_type: number
      unit: kW
      required: true
      source:
        kind: measurement
        instance_ref: site_load
        point_ref: active_power
    - name: temp_avg
      value_type: number
      unit: Cel
      required: true
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: air_temperature
    - name: humidity
      value_type: number
      unit: "%"
      required: true
      range:
        minimum: 0
        maximum: 100
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: relative_humidity
    - name: rain
      value_type: number
      unit: mm
      required: true
      range:
        minimum: 0
      interval_semantics: accumulation_over_cadence
      source:
        kind: covariate
        dataset_ref: weather.observed
        field: precipitation
    - name: quarter_hour
      value_type: number
      unit: "1"
      required: true
      range:
        minimum: 0
        maximum: 95
        integer: true
      source:
        kind: calendar
        transform: quarter_hour_of_day_zero_based

  future_covariates:
    - name: temp_avg
      value_type: number
      unit: Cel
      required: true
      known_ahead: true
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: air_temperature
    - name: humidity
      value_type: number
      unit: "%"
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 100
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: relative_humidity
    - name: rain
      value_type: number
      unit: mm
      required: true
      known_ahead: true
      range:
        minimum: 0
      interval_semantics: accumulation_over_cadence
      source:
        kind: covariate
        dataset_ref: weather.nwp
        field: precipitation
    - name: quarter_hour
      value_type: number
      unit: "1"
      required: true
      known_ahead: true
      range:
        minimum: 0
        maximum: 95
        integer: true
      source:
        kind: calendar
        transform: quarter_hour_of_day_zero_based

  static_features: []

alignment:
  aggregation: mean
  timestamp_semantics: interval_end
  duplicate_policy: latest
  # `rain: sum` is valid only after commissioning proves source rows are
  # interval increments rather than rolling totals or rates.
  feature_policies:
    - { name: load, aggregation: mean, duplicate_policy: latest }
    - { name: temp_avg, aggregation: mean, duplicate_policy: latest }
    - { name: humidity, aggregation: mean, duplicate_policy: latest }
    - { name: rain, aggregation: sum, duplicate_policy: latest }
    - { name: quarter_hour, aggregation: last, duplicate_policy: reject }
  gap_policy: reject
  missing_policy: reject

quality:
  max_input_age_seconds: 900
  max_gap_seconds: 1800
  max_missing_ratio: 0.0
  require_input_watermark: true
  require_covariate_issue_time_not_after_as_of: true

artifact_policy:
  required: false
  allowed_kinds:
    - model

fallback:
  allowed: true
  strategies:
    - name: persistence
      version: "1"
      source_feature: load
      max_expires_after_seconds: 1800
  synthetic_zero_baseline: forbidden

execution:
  deadline_ms: 5000
  max_attempts: 1
  # Content identity for correlation/audit only. The public process operation is
  # non-idempotent and does not promise request replay or de-duplication.
  correlation_key: input_digest
  max_request_bytes: 4194304

governance:
  data_classification: operational_telemetry
  remote_egress: denied
  device_effect: none
  audit_raw_values: false

output:
  schema: aether.data-processing.output.forecast.v1
  value_type: number
  unit: kW
  sign_convention: positive_consumption
  cadence_seconds: 900
  timestamp_semantics: interval_end
  max_points: 288
  max_quantiles: 0
  expires_after_seconds: 3600
  publication:
    - query_response
  retention: none
