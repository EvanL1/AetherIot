# Synthetic commissioning template. Copy to the configured runtime path, replace
# every example logical/physical route and artifact digest, then validate against
# the site's Aether database before setting AETHER_DATA_PROCESSING_ENABLED=true.
schema: aether.data-processing-runtime.v1

history:
  path: /app/data/aether-history.db
  max_raw_samples_per_feature: 50000

covariates:
  path: /app/data/config/data-processing/covariates.json
  max_file_bytes: 4194304
  max_bindings: 16
  max_runs_per_binding: 8
  max_features: 16
  max_samples: 4096

routes:
  - enabled: true
    deadline_ms: 5000
    max_concurrency: 1
    remote_preapproved: false

    task:
      id: energy.site-load-forecast
      revision: 1
      processor_contract: aether.data-processing.forecast.v1
      target:
        name: load
        unit: kW
        sign_convention: positive_consumption
      cadence_seconds: 900
      history_aggregation: mean
      history_duplicate_policy: latest
      history_steps: 672
      max_horizon_steps: 288
      max_quantiles: 0
      max_output_age_seconds: 3600
      max_missing_ratio: 0.0
      max_input_age_seconds: 900
      max_gap_seconds: 1800
      require_future_issue_time: true
      remote_egress_allowed: false
      features:
        - { name: load, role: history, value_type: number, unit: kW, history_aggregation: mean, history_duplicate_policy: latest }
        - { name: temp_avg, role: history, value_type: number, unit: Cel, history_aggregation: mean, history_duplicate_policy: latest }
        - { name: humidity, role: history, value_type: number, unit: "%", history_aggregation: mean, history_duplicate_policy: latest, constraints: { minimum: 0.0, maximum: 100.0 } }
        # Commission this Sum only after a site fixture proves raw rows are
        # per-interval increments, never rolling accumulation or a rate.
        - { name: rain, role: history, value_type: number, unit: mm, history_aggregation: sum, history_duplicate_policy: latest, constraints: { minimum: 0.0 } }
        - { name: quarter_hour, role: history, value_type: number, unit: "1", history_aggregation: last, history_duplicate_policy: reject, constraints: { minimum: 0.0, maximum: 95.0, integer: true } }
        - { name: temp_avg, role: future_covariate, value_type: number, unit: Cel }
        - { name: humidity, role: future_covariate, value_type: number, unit: "%", constraints: { minimum: 0.0, maximum: 100.0 } }
        - { name: rain, role: future_covariate, value_type: number, unit: mm, constraints: { minimum: 0.0 } }
        - { name: quarter_hour, role: future_covariate, value_type: number, unit: "1", constraints: { minimum: 0.0, maximum: 95.0, integer: true } }
      fallbacks:
        - strategy: persistence
          version: "1"
          source_feature: load
          max_output_age_seconds: 1800

    binding:
      id: energy.example-site
      revision: 1
      commissioned: true
      remote_egress_allowed: false
      point_features:
        - feature: load
          instance_id: 1001
          point_id: 1
          kind: telemetry
          live_tail: false
      artifact:
        kind: model
        family: site-load
        version: v3
        artifact_digest: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

    history:
      routes:
        - binding_id: energy.example-site
          binding_revision: 1
          feature: load
          source_ref: energy.site.load.active_power
          source:
            kind: stored
            series_key: inst:1001:M
            point_id: "1"
            source_unit: kW
            expected_scale: 1.0
            expected_offset: 0.0
            source_sign_convention: positive_consumption
        - binding_id: energy.example-site
          binding_revision: 1
          feature: temp_avg
          source_ref: weather.observed.air_temperature
          source:
            kind: stored
            series_key: inst:2001:M
            point_id: "1"
            source_unit: Cel
            expected_scale: 1.0
            expected_offset: 0.0
        - binding_id: energy.example-site
          binding_revision: 1
          feature: humidity
          source_ref: weather.observed.relative_humidity
          source:
            kind: stored
            series_key: inst:2001:M
            point_id: "2"
            source_unit: "%"
            expected_scale: 1.0
            expected_offset: 0.0
        - binding_id: energy.example-site
          binding_revision: 1
          feature: rain
          source_ref: weather.observed.precipitation
          source:
            kind: stored
            series_key: inst:2001:M
            point_id: "3"
            source_unit: mm
            expected_scale: 1.0
            expected_offset: 0.0
        - binding_id: energy.example-site
          binding_revision: 1
          feature: quarter_hour
          source_ref: calendar.utc.quarter_hour
          source:
            kind: quarter_hour_of_day

    processor:
      endpoint: http://127.0.0.1:8989/
      id: load-forecasting-edge
      version: 0.1.0
      contract: aether.data-processing.forecast.v1
      requires_artifact: true
      boundary: local
      max_frame_cells: 5000
      max_request_bytes: 4194304
      connect_timeout_ms: 500
      request_timeout_ms: 4500
      max_response_bytes: 4194304
      bearer_token_env: AETHER_LOAD_FORECASTING_BEARER_TOKEN
