# Production-only override. Include this file explicitly so required secrets
# and an immutable image digest are evaluated only for a commissioned rollout.
services:
  aether-load-forecasting-processor:
    profiles: ["data-processing"]
    image: ${AETHER_LOAD_FORECASTING_IMAGE:?set an immutable image reference with @sha256}
    environment:
      AETHER_LOAD_FORECASTING_REQUIRE_AUTH: "true"
      AETHER_LOAD_FORECASTING_BEARER_TOKEN: ${AETHER_LOAD_FORECASTING_BEARER_TOKEN:?set a unique processor bearer token}
      AETHER_LOAD_FORECASTING_MAX_CONCURRENCY: ${AETHER_LOAD_FORECASTING_MAX_CONCURRENCY:-1}
      AETHER_LOAD_FORECASTING_ARTIFACT_BUNDLES: ${AETHER_LOAD_FORECASTING_ARTIFACT_BUNDLES:?set commissioned artifact bundle JSON}

  aether-api:
    environment:
      AETHER_DATA_PROCESSING_ENABLED: "true"
      AETHER_DATA_PROCESSING_CONFIG: /app/data/config/data-processing/runtime.yaml
      AETHER_LOAD_FORECASTING_BEARER_TOKEN: ${AETHER_LOAD_FORECASTING_BEARER_TOKEN:?set the matching processor bearer token}
