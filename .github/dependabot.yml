version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    # Keep routine maintenance reviewable: one grouped PR per ecosystem.
    open-pull-requests-limit: 1
    groups:
      cargo-maintenance:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    rebase-strategy: auto
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 1
    groups:
      github-actions-maintenance:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # The action ref is the repository's pinned Rust release, not an
      # independently upgradeable action version.
      - dependency-name: "dtolnay/rust-toolchain"
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    rebase-strategy: auto
    commit-message:
      prefix: ci
      include: scope
