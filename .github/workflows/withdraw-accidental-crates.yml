name: Withdraw Accidental Crate Versions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yank:
    name: Yank unsupported 0.5.0 crates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Yank accidentally published versions
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          crates=(
            aether-domain
            aether-dataplane
            aether-pack
            aether-ports
            aether-data-processing
            aether-testkit
            aether-shm-bridge
            aether-store-local
          )
          for crate in "${crates[@]}"; do
            cargo yank --vers 0.5.0 "$crate"
          done

      - name: Verify every version is yanked
        shell: bash
        run: |
          set -euo pipefail
          crates=(
            aether-domain
            aether-dataplane
            aether-pack
            aether-ports
            aether-data-processing
            aether-testkit
            aether-shm-bridge
            aether-store-local
          )
          for crate in "${crates[@]}"; do
            curl --fail --silent --show-error \
              --user-agent 'AetherIot release cleanup (https://github.com/EvanL1/AetherIot)' \
              "https://crates.io/api/v1/crates/$crate/0.5.0" \
              | python3 -c 'import json, sys; assert json.load(sys.stdin)["version"]["yanked"] is True'
          done
