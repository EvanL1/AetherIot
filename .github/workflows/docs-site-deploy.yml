name: Docs Site Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "crates/*/README.md"
      - "extensions/*/README.md"
      - ".github/workflows/docs-site-deploy.yml"

permissions:
  contents: read

concurrency:
  group: docs-site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Type, content, and language check
        working-directory: docs-site
        run: npm run check

      - name: Unit tests
        working-directory: docs-site
        run: npm run test:coverage

      - name: Worker unit tests
        working-directory: docs-site
        run: npm run test:worker

      - name: Build dual-mode documentation
        working-directory: docs-site
        run: npm run build

      - name: Verify HTML and agent representations
        working-directory: docs-site
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/index.md
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          if rg --pcre2 '\p{Han}|\p{Hiragana}|\p{Katakana}|\p{Hangul}' dist/*.md dist/*.txt dist/*/*.md; then
            echo "Published agent documentation must be English-only."
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: docs-site
          command: deploy
