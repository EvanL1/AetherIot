name: Docs Site Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "crates/*/README.md"
      - "extensions/*/README.md"
      - ".github/workflows/docs-site-deploy.yml"

permissions:
  contents: read

concurrency:
  group: docs-site-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AETHER_CLOUD_DOCS_ROOT: ${{ github.workspace }}/.docs-sources/AetherCloud
      AETHER_CONTRACTS_DOCS_ROOT: ${{ github.workspace }}/.docs-sources/AetherContracts

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout AetherCloud documentation source
        uses: actions/checkout@v5
        with:
          repository: EvanL1/AetherCloud
          path: .docs-sources/AetherCloud
          fetch-depth: 0

      - name: Checkout AetherContracts documentation source
        uses: actions/checkout@v5
        with:
          repository: EvanL1/AetherContracts
          path: .docs-sources/AetherContracts
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Type, content, and language check
        working-directory: docs-site
        run: npm run check

      - name: Unit tests
        working-directory: docs-site
        run: npm run test:coverage

      - name: Worker unit tests
        working-directory: docs-site
        run: npm run test:worker

      - name: Build dual-mode documentation
        working-directory: docs-site
        run: npm run build

      - name: Verify HTML and agent representations
        working-directory: docs-site
        shell: bash
        run: |
          test -f dist/index.html
          test -f dist/index.md
          test -f dist/llms.txt
          test -f dist/llms-full.txt
          test -f dist/en/index.html
          test -f dist/en.md
          test -f dist/en/llms.txt
          test -f dist/en/llms-full.txt
          node scripts/check-language.mjs dist

      - name: Normalize Cloudflare API token
        id: cloudflare-token
        shell: bash
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          trim() {
            local value=$1
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          token=$(trim "$RAW_TOKEN")
          if [[ "$token" =~ ^(export[[:space:]]+)?CLOUDFLARE_API_TOKEN[[:space:]]*=[[:space:]]*(.*)$ ]]; then
            token=${BASH_REMATCH[2]}
          fi
          token=$(trim "$token")

          if (( ${#token} >= 2 )); then
            first=${token:0:1}
            last=${token: -1}
            if [[ ( "$first" == '"' && "$last" == '"' ) \
              || ( "$first" == "'" && "$last" == "'" ) ]]; then
              token=${token:1:${#token}-2}
              token=$(trim "$token")
            fi
          fi

          if [[ "${token,,}" == bearer\ * ]]; then
            token=${token#* }
            token=$(trim "$token")
          fi

          if [[ -z "$token" || "$token" =~ [[:space:]] ]]; then
            echo "CLOUDFLARE_API_TOKEN must resolve to one non-empty token without whitespace." >&2
            exit 1
          fi

          echo "::add-mask::$token"
          printf 'token=%s\n' "$token" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ steps.cloudflare-token.outputs.token }}
          workingDirectory: docs-site
          command: deploy
