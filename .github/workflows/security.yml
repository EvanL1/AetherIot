name: Supply Chain Security

on:
  push:
    branches: [main, develop]
    paths:
      - "**/Cargo.toml"
      - Cargo.lock
      - deny.toml
      - .github/workflows/security.yml
  pull_request:
    branches: [main, develop]
    paths:
      - "**/Cargo.toml"
      - Cargo.lock
      - deny.toml
      - .github/workflows/security.yml
  schedule:
    - cron: "17 19 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.90.0"

jobs:
  cargo-audit:
    name: RustSec Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Cargo.lock
        # RUSTSEC-2023-0071 has no fixed release. The affected RSA operations
        # are unreachable behind the enforced OPC UA SecurityPolicy::None
        # boundary documented in docs/security/dependency-exceptions.md.
        run: cargo audit --ignore RUSTSEC-2023-0071

  cargo-deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check advisories, licenses, bans, and sources
        # Pin a reviewed revision so a moving tag cannot change the action
        # contract underneath this workflow.
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: "1.90.0"
          command: check
          arguments: --all-features
