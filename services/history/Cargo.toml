[package]
name = "aether-history"
publish = false
version.workspace = true
edition = "2024"
license.workspace = true

[[bin]]
name = "aether-history"
path = "src/main.rs"

[dependencies]
# Local libraries
common = { path = "../../libs/common", default-features = false, features = ["sqlite", "axum"] }
aether-domain = { path = "../../crates/aether-domain" }
aether-ports = { path = "../../crates/aether-ports" }
aether-shm-bridge = { path = "../../extensions/shm-bridge" }

# Async runtime
tokio = { workspace = true }
tokio-util = { workspace = true }

# Web framework
axum = { workspace = true }
tower-http = { workspace = true, features = ["cors"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Embedded SQLite is always available; PostgreSQL/TimescaleDB are opt-in.
sqlx = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }

# Utilities
chrono = { workspace = true }
async-trait = { workspace = true }
regex = { workspace = true }

# OpenAPI / Swagger UI
utoipa = { workspace = true }
utoipa-swagger-ui = { workspace = true, optional = true }
urlencoding = "2.1.3"
url = "2.5.8"

[features]
swagger-ui = ["utoipa-swagger-ui", "common/openapi"]
postgres-storage = ["sqlx/postgres"]

[lints]
workspace = true
